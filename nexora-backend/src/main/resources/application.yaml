# ===============================
# PROFILE TEST
# ===============================
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:nexora_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER,VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

  cache:
    type: none

  servlet:
    multipart:
      enabled: true
      max-file-size: 25MB
      max-request-size: 26MB

logging:
  level:
    com.nexora: DEBUG
    org.flywaydb: DEBUG

nexora:
  jwt:
    secret: "test-secret-key"
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
