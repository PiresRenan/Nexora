---
# Perfil test — usado apenas durante os testes unitários/integração
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:nexora_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE,USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    # Ignora migrations que falharem em sintaxe incompatível (opcional, use com cautela)
    # ignore-migration-patterns: "*:ignored,*:pending"

logging:
  level:
    com.nexora: DEBUG
    org.flywaydb: DEBUG
    org.h2: WARN

nexora:
  jwt:
    secret: "kH9mN2bV5cX7zL4pQ8rT1wY3uA6sD9fG0jK2lM4nP6="
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
