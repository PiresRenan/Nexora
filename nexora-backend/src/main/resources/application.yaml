  datasource:
    url: jdbc:postgresql://localhost:5432/nexora
    username: postgres
    password: 14262767
    hikari:
      maximum-pool-size: 5

logging:
  level:
    com.nexora: INFO

server:
  port: 8080

nexora:
  jwt:
    secret: "X5pLqR8vY2zN4mB6jC7kF9hW0tG1uA3sD4eR6tY8uI="
    access-token-expiration-ms: 900000
