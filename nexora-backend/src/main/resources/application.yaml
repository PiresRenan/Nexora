spring:
  application:
    name: nexora-backend
  # Melhoria: Virtual Threads (Project Loom) — Java 21
  threads:
    virtual:
      enabled: true

  # JPA — NUNCA usar ddl-auto=create em produção
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  # Flyway — controle de migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-version: 1
    baseline-on-migrate: false
    validate-on-migrate: true
  security:
    user:
      name: "renan"
      password: "14262767"


# Actuator — health checks e métricas
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  components:
    security-schemes:
      bearerAuth:
        type: http
        scheme: bearer
        bearerFormat: JWT

---
# Perfil local — PostgreSQL local
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://postgres:5432/nexora
    username: postgres
    password: 14262767
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true

# Redis Configuration
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms

# Kafka Configuration
kafka:
  bootstrap-servers: kafka:9092
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false
  consumer:
    group-id: nexora-backend
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    properties:
      spring.json.trusted.packages: "com.nexora.*"

  cache:
    type: redis
    redis:
      time-to-live: 300000   # 5 minutos


logging:
  level:
    com.nexora: DEBUG
    org.flywaydb: INFO
    org.springframework.security: DEBUG
    org.springframework.kafka: INFO

server:
  port: 8080

nexora:
  jwt:
    secret: "uRqX8yTzLp9sNvFgHjKmQwErYtIoUaBcDfGhJkL0="
    access-token-expiration-ms: 900000        # 15 minutos
    refresh-token-expiration-ms: 604800000    # 7 dias
  kafka:
    topics:
      orders: nexora.orders
      stock: nexora.stock
      users: nexora.users


