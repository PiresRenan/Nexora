spring:
  application:
    name: nexora-backend

  # Java 21 Virtual Threads
  threads:
    virtual:
      enabled: true

  jackson:
    time-zone: America/Sao_Paulo

  servlet:
    multipart:
      enabled: true
      max-file-size: 25MB
      max-request-size: 26MB

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-version: 1
    baseline-on-migrate: false
    validate-on-migrate: true

  # Basic security (dev)
  security:
    user:
      name: ""
      password: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

server:
  port: 8080

---

# ===============================
# PROFILE LOCAL
# ===============================
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/nexora
    username: nexora
    password: nexora
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: nexora-backend
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.nexora.*"

  cache:
    type: redis
    redis:
      time-to-live: 300000

logging:
  level:
    com.nexora: DEBUG
    org.flywaydb: INFO
    org.springframework.security: DEBUG
    org.springframework.kafka: INFO
    io.minio: INFO

nexora:
  jwt:
    secret: "nexora-local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-ok"
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

  kafka:
    topics:
      orders: nexora.orders
      stock: nexora.stock
      users: nexora.users

  storage:
    endpoint: http://localhost:9000
    access-key: nexora
    secret-key: nexora123
    secure: false
    images-bucket: nexora-images
    documents-bucket: nexora-documents

